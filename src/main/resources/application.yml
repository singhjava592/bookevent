server:
  port: 8080

spring:
  application:
    name: ticket-booking-system
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ticket_booking?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

app:
  holds:
    ttl-minutes: 5
    max-quantity-per-hold: 10 # 0 means unlimited
  cache:
    availability-ttl-seconds: 2
  security:
    jwt:
      issuer: ticket-booking-system
      access-token-ttl-minutes: 60
      secret: ${JWT_SECRET:change-me-to-a-long-random-secret-at-least-32-chars}

logging:
  level:
    org.hibernate.SQL: warn
